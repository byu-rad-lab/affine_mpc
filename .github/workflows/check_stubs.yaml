name: Check Stubs

on:
  pull_request:
    paths:
      - python/bindings/**
      - python/CMakeLists.txt
      - python/custom_stubgen.py
      - python/affine_mpc/_bindings.pyi
      - pyproject.toml
      - .github/workflows/check_stubs.yaml
  push:
    branches: [main]
    paths:
      - python/bindings/**
      - python/CMakeLists.txt
      - python/custom_stubgen.py
      - python/affine_mpc/_bindings.pyi
      - pyproject.toml
      - .github/workflows/check_stubs.yaml

jobs:
  check-stubs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libeigen3-dev zlib1g-dev

      - name: Install package and regenerate stubs
        run: |
          python -m pip install ".[dev]"
          python python/custom_stubgen.py

      - name: Check committed stub file is up to date
        run: |
          git diff --exit-code -- python/affine_mpc/_bindings.pyi || {
            echo "Generated bindings stub differs from python/affine_mpc/_bindings.pyi"
            echo "Regenerate the stub locally and commit the updated file."
            exit 1
          }
