[project]
site_name = "affine_mpc Documentation"
site_description = "Documentation for the affine_mpc library and Python package"
site_author = "Mathew Haskell"
copyright = "&copy; 2026 Brigham Young University"
docs_dir = "docs"
site_dir = "site"
repo_url = "https://github.com/byu-rad-lab/affine_mpc"
repo_name = "byu-rad-lab/affine_mpc"

nav = [
    {"Home" = "index.md"},
    {"Concepts" = [
        "concepts/index.md",
        "concepts/problem-formulation.md",
        "concepts/input-parameterization.md",
        "concepts/qp-formulation.md",
        "concepts/runtime-updates.md",
    ]},
    {"Python" = [
        "python/index.md",
        "python/getting-started.md",
        "python/usage.md",
        # {"Getting Started" = "python/getting-started.md"},
        # {"Usage" = "python/usage.md"},
    ]},
    {"C++" = [
        "cpp/index.md",
        "cpp/getting-started.md",
        "cpp/usage.md",
        # {"Getting Started" = "cpp/getting-started.md"},
        # {"Usage" = "cpp/usage.md"},
    ]},
    {"Examples" = "examples.md"},
    {"Logging" = "logging.md"},
    {"Development" = "development.md"},
]

extra_javascript = [
    "javascripts/mathjax.js",
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js"
]

[project.theme]
# variant = "classic"
pallete.primary = "blue grey"
pallete.accent = "blue"
features = [
    # "navigation.tabs",
    # "navigation.sections",
    "navigation.expand",
    "navigation.path",
    "navigation.indexes",
    "navigation.top",
    "search.suggest",
    "search.highlight",
    "content.code.copy",
    "content.tabs.link",
]

# Palette toggle for automatic mode
# [[project.theme.palette]]
# media = "(prefers-color-scheme)"
# toggle.icon = "lucide/sun-moon"
# toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

## MD extensions
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.tables]

# table of contents
[project.markdown_extensions.toc]
permalink = true
title = "On this page"
permalink_title = "Anchor link to this section"

# supercharge admonition ext, making call-outs collapsible
[project.markdown_extensions.pymdownx.details]

# allows for arbitrary nesting of code and content blocks inside each other,
# including admonitions, tabs, lists, and all other elements
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

# syntax highlighting of inline code blocks
[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.pymdownx.inlinehilite]

# renders block and inline block equations and integrates with MathJax
[project.markdown_extensions.pymdownx.arithmatex]
generic = true

# allows usage of content tabs
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
